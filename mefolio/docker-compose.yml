services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - meteor_local:/app/.meteor/local
      - node_modules:/app/node_modules
    environment:
      ROOT_URL: http://localhost:3000
      PORT: 3000
      METEOR_WATCH_FORCE_POLLING: "true"
    restart: unless-stopped
 
volumes:
  meteor_local:
  node_modules: