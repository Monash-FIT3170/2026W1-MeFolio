version: "3"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
    stdin_open: true
    tty: true
    environment:
      - MONGO_URL=mongodb://mongo:27017/meteor
      - ROOT_URL=http://localhost:3000
      - CHOKIDAR_USEPOLLING=true
      - METEOR_ALLOW_SUPERUSER=true
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    # volumes:
    #   - mongo-data:/data/db